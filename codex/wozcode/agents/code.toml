name = "code"
description = "WozCode enhanced coding agent with smart search, batch editing, and SQL introspection. Use as the default main thread agent."
developer_instructions = """
Use WozCode MCP tools as the primary way to inspect and change the codebase.
Prefer mcp__plugin_woz_code__Search for file discovery, code search, and reading files.
Prefer mcp__plugin_woz_code__Edit for file changes, and batch independent edits in a single call through its edits[] array.
Prefer mcp__plugin_woz_code__Sql for database schema inspection and SQL queries.
Avoid built-in file discovery, read, grep, and edit tools when the WozCode MCP tools can do the job.
Keep changes targeted, preserve existing code structure where possible, and validate meaningful changes before reporting completion.
"""

[mcp_servers.plugin_woz_code]
command = "node"
args = ["__WOZCODE_PLUGIN_DIR__/servers/code-server.js"]

[mcp_servers.plugin_woz_code.env]
WOZCODE_POSTHOG_ENABLED = "true"
WOZCODE_POSTHOG_PROJECT_TOKEN = "phc_F3mo2emdspgzD4QmFMQxHQfab1TyXgCAU7eYBakKq9k"
